<!DOCTYPE html>

<html lang="en">
  <head>
    <!-- Compatibility settings. -->
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Page title on browser window. -->
    <title>NASA - Astronaut Application Form</title>
    <!-- Extra infos for search engines. -->
    <meta name="description" content="Submit this form to apply for one of our missions.">
    <meta name="author" content="NASA">
    <!-- Meta tags for sharing on socials. -->
    <meta property="og:title" content="NASA - Astronaut Application Form">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://www.nasa.com/astronaut-application-form/">
    <meta property="og:description" content="Submit this form to apply for one of our missions.">
    <meta property="og:image" content="./assets/images/og-image.png">
    <!-- CSS -->
    <link rel="stylesheet" href="./styles/styles.css?v=1.0">
  </head>
  <body>
    <!-- Page content here. -->
    <h1>NASA - Astronaut Application Form</h1>
    <h2>Submit this form to apply for one of our missions.</h2>
    <form action="https://webhook.site/beabfe75-7980-4f93-bf72-95c4fe57fc41" method="post" target="_blank" autocomplete="on">
      <!-- ===== Candidate Name: first and last name required ===== -->
      <fieldset>
        <legend><h3>Astronaut Candidate Name</h3></legend>
        <ul>
          <li>
            <!-- First Name (required) -->
            <label for="firstname">First Name:</label>
            <input type="text" id="firstname" name="firstname" required placeholder="Yuri">
          </li>
          <li>
            <!-- Middle Name (optional) -->
            <label for="middlename">Middle Name:</label>
            <input type="text" id="middlename" name="middlename" placeholder="(Optional)">
          </li>
          <li>
            <!-- Last Name (required) -->
            <label for="lastname">Last Name:</label>
            <input type="text" id="lastname" name="lastname" required placeholder="Gagarin">
          </li>
        </ul>
      </fieldset>
      <p></p>
      <!-- ===== Personal Characteristics: types used -> number, radio, color + datalist ===== -->
      <fieldset>
        <legend><h3>Personal Characteristics</h3></legend>
        <!-- Age: number, integer from 18 to 100 -->
        <label for="age">Age (18-100):</label>
        <input type="number" id="age" name="age" min="18" max="100" required>
        <p></p><p></p>
        <!-- Weight: number, float from 37 to 100, step 0.1 -->
        <label for="weight">Weight (kg):</label>
        <input type="number" id="weight" name="weight" min="37" max="100" step="0.1" placeholder="75.5">
        <p></p><p></p>
        <!-- Gender: radio button, default other -->
        <span>Gender:</span>
        <input type="radio" id="female" name="gender" value="female">
        <label for="female">Female</label>
        <input type="radio" id="male" name="gender" value="male">
        <label for="male">Male</label>
        <input type="radio" id="other" name="gender" value="other" checked>
        <label for="other">Other</label>
        <p></p><p></p>
        <!-- Colors: color selectors with some default options provided with datalist -->
        <label for="haircolor">Hair Color:</label>
        <input type="color" id="haircolor" name="haircolor" list="standard-colors" value="#775555">
        <label for="eyecolor">Eye Color:</label>
        <input type="color" id="eyecolor" name="eyecolor" list="standard-colors" value="#5599ee">
        <datalist id="standard-colors">
          <option value="#775599">Purple</option>
          <option value="#5599ee">Blue</option>
          <option value="#339955">Green</option>
          <option value="#aa9955">Blonde</option>
          <option value="#aa5533">Red</option>
          <option value="#755555">Brown</option>
          <option value="#553333">Dark Brown</option>
          <option value="#000000">Black</option>
          <option value="#777777">Grey</option>
          <option value="#FFFFFF">White</option>
        </datalist>
      </fieldset>
      <p></p>
      <!-- ===== Contact information: types used -> email, tel ===== -->
      <fieldset>
        <legend><h3>Contact Information</h3></legend>
        <label for="email">Email Address:</label>
        <input type="email" id="email" name="email" required placeholder="me@nasa.gov">
        <p></p><p></p>
        <label for="phone">Phone Number:</label>
        <input type="tel" id="phone" name="phone" minlength="9" maxlength="10" placeholder="1234567890" pattern="[0-9]{9,10}" title="Please enter a 9 or 10 digit number">
      </fieldset>
      <p></p>
      <fieldset>
        <legend><h3>About You</h3></legend>
        <!-- ===== Biography: types used -> text area ===== -->
        <label for="bio"><strong>Short Biography</strong> (max 255 chars):</label><p></p>
        <textarea id="bio" name="bio" rows="4" cols="50" maxlength="255" placeholder="Tell us why you belong in space..."></textarea>
        <p></p><p></p>
        <!-- ===== Select Mission: default not selectable ===== -->
        <label for="mission"><strong>Desired Mission:</strong></label>
        <select id="mission" name="mission" required>
          <option value="" disabled selected>- Select an option -</option>
          <option value="europa_clipper">Europa Clipper (Jupiter's Moon)</option>
          <option value="psyche">Psyche (Metal-Rich Asteroid)</option>
          <option value="dragonfly">Dragonfly (Titan)</option>
          <option value="artemis">Artemis (Return to Moon)</option>
          <option value="mars_sample_return">Mars Sample Return</option>
          <option value="spherex">SPHEREx (Origins of Universe)</option>
          <option value="cadre">CADRE (Lunar Mapping)</option>
        </select>
        <p></p>
      </fieldset>
      <p></p>
      <!-- ===== Bonus: types used -> range slider + output (oninput -> changes output with js) ===== -->
      <label for="readiness"><em>Ready to blast off?</em> (0-100%):</label>
      <input type="range" id="readiness" name="readiness" min="0" max="100" step="1" value="50" oninput="this.nextElementSibling.value = this.value">
      <output>50</output>%
      <p></p>
      <!-- ===== Reset + Submit buttons ===== -->
      <button type="reset">Clear Form</button>
      <button type="submit">Submit Application</button>
    </form>
    <p></p>
    <hr/>
    <p><i>Thank you for your application!</i></p>
    <!-- End of the body. -->
    <!-- JS -->
    <script defer src="./scripts/scripts.js"></script>
  </body>
</html>
